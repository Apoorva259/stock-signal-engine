<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stock Signal Engine</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f1117;
    color: #e6e6e6;
    margin: 0;
    padding: 40px 20px;
  }
  .container { max-width: 800px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { color: #8a8f98; font-size: 14px; margin-bottom: 28px; }

  .controls { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
  .error { color: #f87171; font-size: 14px; margin-top: -16px; margin-bottom: 20px; display: none; }
  .autocomplete { position: relative; flex: 1; min-width: 200px; }
  .autocomplete input {
    width: 100%; background: #1a1d27; border: 1px solid #2c2f3a; color: #e6e6e6;
    padding: 10px 14px; border-radius: 8px; font-size: 14px;
  }
  .autocomplete input:focus { border-color: #4f7cff; outline: none; }
  .suggestions {
    position: absolute; top: 100%; left: 0; right: 0; z-index: 10;
    background: #1a1d27; border: 1px solid #2c2f3a; border-radius: 0 0 8px 8px;
    max-height: 300px; overflow-y: auto; display: none;
  }
  .suggestions div {
    padding: 8px 14px; cursor: pointer; font-size: 13px; display: flex; justify-content: space-between;
  }
  .suggestions div:hover, .suggestions div.active { background: #2c2f3a; }
  .suggestions .sym { color: #e6e6e6; font-weight: 600; }
  .suggestions .name { color: #8a8f98; margin-left: 8px; }
  .suggestions .exch { color: #4f7cff; font-size: 11px; }
  button {
    background: #4f7cff; color: white; border: none; padding: 10px 20px;
    border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 500;
  }
  button:hover { background: #3d68e6; }

  .card {
    background: #1a1d27; border: 1px solid #2c2f3a; border-radius: 12px;
    padding: 24px; margin-bottom: 20px;
  }
  .signal-row { display: flex; align-items: baseline; gap: 16px; }
  .signal-badge {
    font-size: 15px; font-weight: 700; padding: 6px 14px; border-radius: 6px;
  }
  .buy   { background: #163a2b; color: #4ade80; }
  .sell  { background: #3a1a1a; color: #f87171; }
  .hold  { background: #2c2f1a; color: #eab308; }

  .score { font-size: 32px; font-weight: 700; }
  .meta { color: #8a8f98; font-size: 13px; margin-top: 10px; }
  .meta span { margin-right: 16px; }

  canvas { max-height: 320px; }
</style>
</head>
<body>
<div class="container">
  <h1>Stock Signal Engine</h1>
  <div class="subtitle">Composite technical signal — powered by yfinance</div>

  <div class="controls">
    <div class="autocomplete">
      <input id="symbolInput" placeholder="Search stock (e.g. AAPL, TCS.NS, RELIANCE.NS)" value="RELIANCE.NS" autocomplete="off">
      <div id="suggestions" class="suggestions"></div>
    </div>
    <button onclick="loadSignal()">Get Signal</button>
  </div>

  <div id="errorMessage" class="error"></div>

  <div class="card">
    <div class="signal-row">
      <span id="signalBadge" class="signal-badge hold">--</span>
      <span id="scoreValue" class="score">--</span>
    </div>
    <div class="meta">
      <span>Close: ₹<span id="closeValue">--</span></span>
      <span>RSI(14): <span id="rsiValue">--</span></span>
      <span>Trend: <span id="trendValue">--</span></span>
      <span>MACD: <span id="macdValue">--</span></span>
    </div>
    <div id="explanation" style="margin-top: 14px; padding-top: 14px; border-top: 1px solid #2c2f3a; color: #8a8f98; font-size: 13px;"></div>
  </div>

  <div id="componentsCard" class="card" style="display:none;">
    <div style="font-size:13px; color:#8a8f98; margin-bottom:12px;">Score Breakdown</div>
    <div id="componentsContainer" style="display:flex; gap:12px; flex-wrap:wrap;"></div>
  </div>

  <div class="card">
    <canvas id="priceChart"></canvas>
  </div>
</div>

<script>
let chart = null;
let activeIdx = -1;
let searchTimer = null;

function badgeClass(signal) {
  if (signal.includes("BUY")) return "buy";
  if (signal.includes("SELL")) return "sell";
  return "hold";
}

function showError(msg) {
  document.getElementById("errorMessage").textContent = msg;
  document.getElementById("errorMessage").style.display = msg ? "block" : "none";
  document.getElementById("signalBadge").textContent = "--";
  document.getElementById("signalBadge").className = "signal-badge hold";
  document.getElementById("scoreValue").textContent = "--";
  document.getElementById("closeValue").textContent = "--";
  document.getElementById("rsiValue").textContent = "--";
  document.getElementById("trendValue").textContent = "--";
  document.getElementById("macdValue").textContent = "--";
  document.getElementById("explanation").innerHTML = "";
  document.getElementById("componentsCard").style.display = "none";
  if (chart) { chart.destroy(); chart = null; }
}

function componentBar(value, label, color) {
  const pct = ((value + 100) / 200 * 100).toFixed(0);
  return `<div style="flex:1; min-width:100px;">
    <div style="font-size:11px; color:#8a8f98; margin-bottom:4px;">${label}</div>
    <div style="background:#2c2f3a; border-radius:4px; height:8px; overflow:hidden;">
      <div style="width:${pct}%; height:100%; background:${color}; border-radius:4px;"></div>
    </div>
    <div style="font-size:12px; margin-top:2px;">${value > 0 ? '+' : ''}${value}</div>
  </div>`;
}

async function showSuggestions() {
  const input = document.getElementById("symbolInput");
  const container = document.getElementById("suggestions");
  const q = input.value.trim();
  if (!q) { container.style.display = "none"; return; }

  try {
    const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
    const data = await res.json();
    const matches = data.results || [];
    activeIdx = -1;

    if (!matches.length) { container.style.display = "none"; return; }

    container.innerHTML = matches.map((t, i) =>
      `<div class="${i === activeIdx ? 'active' : ''}" data-index="${i}" onclick="selectSuggestion('${t.symbol}')">
        <span><span class="sym">${t.symbol}</span><span class="name">${t.name}</span></span>
        <span class="exch">${t.exchange}</span>
      </div>`
    ).join("");
    container.style.display = "block";
  } catch {
    container.style.display = "none";
  }
}

function onSearchInput() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(showSuggestions, 250);
}

function selectSuggestion(symbol) {
  document.getElementById("symbolInput").value = symbol;
  document.getElementById("suggestions").style.display = "none";
  activeIdx = -1;
  loadSignal();
}

function handleKey(e) {
  const container = document.getElementById("suggestions");
  const items = container.querySelectorAll("div");

  if (e.key === "Enter") {
    if (activeIdx >= 0 && items[activeIdx]) {
      items[activeIdx].click();
    } else {
      loadSignal();
    }
    container.style.display = "none";
    return;
  }

  if (e.key === "ArrowDown") {
    e.preventDefault();
    activeIdx = Math.min(activeIdx + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle("active", i === activeIdx));
    if (items[activeIdx]) items[activeIdx].scrollIntoView({ block: "nearest" });
  } else if (e.key === "ArrowUp") {
    e.preventDefault();
    activeIdx = Math.max(activeIdx - 1, -1);
    items.forEach((el, i) => el.classList.toggle("active", i === activeIdx));
  } else if (e.key === "Escape") {
    container.style.display = "none";
    activeIdx = -1;
  }
}

document.addEventListener("click", (e) => {
  if (!e.target.closest(".autocomplete")) {
    document.getElementById("suggestions").style.display = "none";
  }
});

async function loadSignal() {
  const symbol = document.getElementById("symbolInput").value.trim() || "RELIANCE.NS";
  document.getElementById("suggestions").style.display = "none";
  showError("");

  const res = await fetch(`/api/signal?symbol=${encodeURIComponent(symbol)}`);
  const data = await res.json();

  if (data.error) {
    showError(data.error);
    return;
  }

  const badge = document.getElementById("signalBadge");
  badge.textContent = data.today.signal;
  badge.className = "signal-badge " + badgeClass(data.today.signal);

  document.getElementById("scoreValue").textContent = data.today.score;
  document.getElementById("closeValue").textContent = data.today.close;
  document.getElementById("rsiValue").textContent = data.today.rsi;
  document.getElementById("trendValue").textContent = data.today.trend;
  document.getElementById("macdValue").textContent = data.today.explanation.includes("bullish MACD") ? "Bullish" : "Bearish";

  const expl = document.getElementById("explanation");
  expl.innerHTML = `<strong>Why?</strong> ${data.today.explanation}. Weights: Trend ${data.today.weights.trend}%, Momentum ${data.today.weights.momentum}%, Volatility ${data.today.weights.volatility}%, Volume ${data.today.weights.volume}%.`;

  const comp = data.today.components;
  document.getElementById("componentsContainer").innerHTML =
    componentBar(comp.trend, "Trend", "#4f7cff") +
    componentBar(comp.momentum, "Momentum", "#eab308") +
    componentBar(comp.volatility, "Volatility", "#a78bfa") +
    componentBar(comp.volume, "Volume", "#4ade80");
  document.getElementById("componentsCard").style.display = "block";

  const labels = data.history.map(d => d.date);
  const prices = data.history.map(d => d.close);
  const scores = data.history.map(d => d.composite_score);

  if (chart) chart.destroy();
  const ctx = document.getElementById("priceChart").getContext("2d");
  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [
        {
          label: "Close Price",
          data: prices,
          borderColor: "#4f7cff",
          yAxisID: "y",
          tension: 0.2,
          pointRadius: 0,
        },
        {
          label: "Composite Score",
          data: scores,
          borderColor: "#eab308",
          yAxisID: "y1",
          tension: 0.2,
          pointRadius: 0,
        },
      ],
    },
    options: {
      responsive: true,
      interaction: { mode: "index", intersect: false },
      scales: {
        y: { position: "left", title: { display: true, text: "Price" } },
        y1: { position: "right", min: -100, max: 100, grid: { drawOnChartArea: false }, title: { display: true, text: "Score" } },
      },
      plugins: { legend: { labels: { color: "#e6e6e6" } } },
    },
  });
}

document.getElementById("symbolInput").addEventListener("input", onSearchInput);
document.getElementById("symbolInput").addEventListener("keydown", handleKey);
document.getElementById("symbolInput").addEventListener("blur", () => setTimeout(() => {
  document.getElementById("suggestions").style.display = "none";
}, 200));

loadSignal();
</script>
</body>
</html>
